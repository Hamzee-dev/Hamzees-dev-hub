<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Infinite Neon Jumper</title>
    <style>
        body {
            margin: 0;
            background-color: #05050a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            color: #ec4899;
            margin: 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
        }
        #game-container {
            position: relative;
            background: #0b0b14;
            border: 3px solid #ec4899;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(236, 72, 153, 0.15);
        }
        canvas {
            display: block;
            border-radius: 9px;
        }
        .ui-layer {
            position: absolute;
            top: 15px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-weight: 900;
            pointer-events: none;
            font-size: 1.5rem;
        }
        #score-display { color: #ec4899; text-shadow: 0 2px 10px rgba(236,72,153,0.4); }
        #high-display { color: #fbbf24; text-shadow: 0 2px 10px rgba(251,191,36,0.4); }
        
        #menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 10, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-align: center;
        }
        #menu-overlay.hidden {
            display: none;
        }
        .btn {
            background: #ec4899;
            color: #fff;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
            transition: transform 0.1s, background 0.2s;
        }
        .btn:hover { background: #f472b6; transform: scale(1.05); }
        #game-status { font-size: 2.2rem; color: #ec4899; margin-bottom: 5px; font-weight: 800; }
        #final-stats { color: #a1a1aa; margin-bottom: 20px; font-size: 1rem; }
    </style>
</head>
<body>

    <h1>Neon Altitude</h1>
    <div style="font-size: 0.9rem; color: #4b5563; margin-bottom: 10px; letter-spacing: 1px;">
        MOVE: [ LEFT / RIGHT ARROWS ] OR [ A / D ] | BOUNCE TO CLIMB
    </div>

    <div id="game-container">
        <div class="ui-layer">
            <div id="score-display">Height: 0m</div>
            <div id="high-display">🏆 Max: 0m</div>
        </div>
        <canvas id="jumperCanvas" width="400" height="600"></canvas>
        
        <div id="menu-overlay">
            <div id="game-status">VERTICAL GRID</div>
            <div id="final-stats">Land on neon bars to jump. Grab yellow rocket vectors for hyper boosts.</div>
            <button class="btn" onclick="startGame()">LAUNCH ENGINE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('jumperCanvas');
        const ctx = canvas.getContext('2d');
        const menuOverlay = document.getElementById('menu-overlay');
        const scoreDisplay = document.getElementById('score-display');
        const highDisplay = document.getElementById('high-display');
        const gameStatus = document.getElementById('game-status');
        const finalStats = document.getElementById('final-stats');

        // --- PHYSICS CONFIG ---
        let player = {
            x: 200, y: 400,
            radius: 10,
            vx: 0, vy: 0,
            gravity: 0.3,
            jumpForce: -8.5
        };

        let keys = {};
        let platforms = [];
        let items = [];
        let score = 0;
        let maxAltitude = 0;
        let cameraY = 0;
        let gameActive = false;

        let highScore = localStorage.getItem('jumper_high_score') || 0;
        highDisplay.innerText = "🏆 Max: " + highScore + "m";

        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // --- AUDIO SYNTHS ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(freq, type, duration) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // --- GENERATION ALGORITHMS ---
        function generateInitialSetup() {
            platforms = [];
            items = [];
            cameraY = 0;
            maxAltitude = 0;

            // Guaranteed starting foundation floor platform
            platforms.push({ x: 150, y: 550, width: 100, height: 10, isMoving: false, vx: 0 });

            // Scale modular steps moving upward
            for (let i = 0; i < 12; i++) {
                spawnPlatformAtHeight(500 - (i * 55));
            }
        }

        function spawnPlatformAtHeight(targetY) {
            let width = 70 - Math.min(25, Math.abs(targetY) / 1000); // Shorter targets as player ascends
            let x = Math.random() * (canvas.width - width);
            let isMoving = Math.random() < 0.35 && targetY < 200;
            let vx = isMoving ? (Math.random() < 0.5 ? 1.5 : -1.5) : 0;

            platforms.push({ x, y: targetY, width, height: 10, isMoving, vx });

            // 8% chance to spawn a booster rocket items module
            if (Math.random() < 0.08 && targetY < 300) {
                items.push({
                    x: x + width / 2,
                    y: targetY - 20,
                    radius: 7,
                    picked: false
                });
            }
        }

        // --- MAIN SIMULATION LOOPS ---
        function update() {
            // Horizontal Velocity Inputs
            if (keys['arrowleft'] || keys['a']) player.vx = -4.5;
            else if (keys['arrowright'] || keys['d']) player.vx = 4.5;
            else player.vx *= 0.82; // Friction deceleration handling

            // Apply Basic Gravity Mechanics
            player.vy += player.gravity;

            // Translate Position coordinates
            player.x += player.vx;
            player.y += player.vy;

            // Screen wrapping mechanics
            if (player.x < 0) player.x = canvas.width;
            if (player.x > canvas.width) player.x = 0;

            // Handle moving platforms bounds logic
            platforms.forEach(p => {
                if (p.isMoving) {
                    p.x += p.vx;
                    if (p.x <= 0 || p.x + p.width >= canvas.width) p.vx *= -1;
                }
            });

            // Collision Check: Landing down on platforms
            if (player.vy > 0) {
                platforms.forEach(p => {
                    if (player.x + player.radius > p.x &&
                        player.x - player.radius < p.x + p.width &&
                        player.y + player.radius >= p.y &&
                        player.y - player.radius < p.y + p.height) {
                        
                        player.vy = player.jumpForce;
                        player.y = p.y - player.radius; // Snap cleanly on top edge
                        playSound(400, 'triangle', 0.08);
                    }
                });
            }

            // Collision Check: Rocket booster tracking overlap
            items.forEach(item => {
                if (!item.picked && Math.hypot(player.x - item.x, player.y - item.y) < player.radius + item.radius) {
                    item.picked = true;
                    player.vy = -18; // Massive Hyper Jump propulsion wave
                    playSound(880, 'square', 0.3);
                }
            });

            // Camera Tracking adjustment systems
            if (player.y < canvas.height / 2 + cameraY) {
                cameraY = player.y - canvas.height / 2;
            }

            // Live distance scoring calculations
            let currentHeight = Math.floor(-cameraY / 10);
            if (currentHeight > score) {
                score = currentHeight;
                scoreDisplay.innerText = "Height: " + score + "m";
            }

            // Procedurally spawn next higher stages ahead of camera view fields
            let highestPlatformY = Math.min(...platforms.map(p => p.y));
            if (highestPlatformY > cameraY - 100) {
                spawnPlatformAtHeight(highestPlatformY - 55);
            }

            // Clean up out-of-bounds drop structures below the screen frame limits
            platforms = platforms.filter(p => p.y < cameraY + canvas.height + 50);
            items = items.filter(item => item.y < cameraY + canvas.height + 50);

            // Defeat condition boundary check
            if (player.y > cameraY + canvas.height + player.radius) {
                endGame();
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Apply camera coordinate transformation system
            ctx.save();
            ctx.translate(0, -cameraY);

            // Draw Vector background ambient grid
            ctx.strokeStyle = '#0a0a16'; ctx.lineWidth = 1;
            let startGridY = Math.floor(cameraY / 40) * 40;
            for(let j = startGridY; j < startGridY + canvas.height + 80; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            // Render Platforms
            platforms.forEach(p => {
                ctx.fillStyle = '#110a18';
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.strokeStyle = p.isMoving ? '#00f0ff' : '#a855f7'; 
                ctx.lineWidth = 2.5;
                ctx.strokeRect(p.x, p.y, p.width, p.height);
            });

            // Render Yellow Boost Items Nodes
            items.forEach(item => {
                if (item.picked) return;
                ctx.fillStyle = '#18140a'; ctx.beginPath(); ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2; ctx.stroke();
            });

            // Render Active Player Node
            ctx.fillStyle = '#ec4899'; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2.5; ctx.stroke();

            ctx.restore();
        }

        function gameTick() {
            if (!gameActive) return;
            update();
            render();
            requestAnimationFrame(gameTick);
        }

        // --- LIFECYCLES CONTROL MAPS ---
        function startGame() {
            initAudio();
            player.x = 200; player.y = 450;
            player.vx = 0; player.vy = player.jumpForce;
            score = 0;
            scoreDisplay.innerText = "Height: 0m";
            menuOverlay.classList.add('hidden');
            generateInitialSetup();
            gameActive = true;
            gameTick();
        }

        function endGame() {
            gameActive = false;
            playSound(150, 'sawtooth', 0.45);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('jumper_high_score', highScore);
                highDisplay.innerText = "🏆 Max: " + highScore + "m";
            }

            gameStatus.innerText = "GRAVITY WON";
            finalStats.innerHTML = `Altitude Attained: <b>${score} meters</b>`;
            menuOverlay.classList.remove('hidden');
        }
    </script>
</body>
</html>
