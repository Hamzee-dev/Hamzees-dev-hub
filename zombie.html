<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Survival Arena</title>
    <style>
        body {
            margin: 0;
            background-color: #080810;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            color: #ef4444;
            margin: 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }
        #game-container {
            position: relative;
            background: #11111e;
            border: 3px solid #ef4444;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(239, 68, 68, 0.15);
        }
        canvas {
            display: block;
            border-radius: 9px;
            cursor: crosshair;
        }
        .ui-layer {
            position: absolute;
            top: 15px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-weight: 900;
            pointer-events: none;
            font-size: 1.5rem;
        }
        #score-display { color: #ef4444; text-shadow: 0 2px 10px rgba(239,68,68,0.4); }
        #wave-display { color: #3b82f6; text-shadow: 0 2px 10px rgba(59,130,246,0.4); }
        
        #menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 8, 16, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-align: center;
        }
        #menu-overlay.hidden {
            display: none;
        }
        .btn {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(239, 44, 44, 0.4);
            transition: transform 0.1s, background 0.2s;
        }
        .btn:hover { background: #ff5555; transform: scale(1.05); }
        #game-status { font-size: 2.2rem; color: #ef4444; margin-bottom: 5px; font-weight: 800; }
        #final-stats { color: #a1a1aa; margin-bottom: 20px; font-size: 1rem; }
    </style>
</head>
<body>

    <h1>Neon Outbreak</h1>
    <div style="font-size: 0.9rem; color: #64748b; margin-bottom: 10px; letter-spacing: 1px;">
        MOVE: [ WASD ] | AIM & SHOOT: [ MOUSE CLICK ]
    </div>

    <div id="game-container">
        <div class="ui-layer">
            <div id="score-display">Kills: 0</div>
            <div id="wave-display">Wave: 1</div>
        </div>
        <canvas id="survivalCanvas" width="700" height="450"></canvas>
        
        <div id="menu-overlay">
            <div id="game-status">ZOMBIE ARENA</div>
            <div id="final-stats">Survive the tracking vectors. Collect speed upgrades.</div>
            <button class="btn" onclick="startGame()">START PROTOCOL</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('survivalCanvas');
        const ctx = canvas.getContext('2d');
        const menuOverlay = document.getElementById('menu-overlay');
        const scoreDisplay = document.getElementById('score-display');
        const waveDisplay = document.getElementById('wave-display');
        const gameStatus = document.getElementById('game-status');
        const finalStats = document.getElementById('final-stats');

        // --- GAME STATE VARIABLES ---
        let player = { x: 350, y: 225, radius: 12, speed: 4 };
        let keys = {};
        let mouse = { x: 350, y: 225 };
        let bullets = [];
        let enemies = [];
        let particles = [];
        let score = 0;
        let wave = 1;
        let gameActive = false;
        let spawnInterval = null;

        // Track user mouse coordinates relative to canvas
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        // Fire laser bullet on click
        canvas.addEventListener('mousedown', () => {
            if (!gameActive) return;
            
            // Calculate trajectory direction angle toward mouse position
            let angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            
            bullets.push({
                x: player.x,
                y: player.y,
                dx: Math.cos(angle) * 7,
                dy: Math.sin(angle) * 7,
                radius: 4
            });
            playLaserSound();
        });

        // Watch player WASD keyboard tracking handles
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // --- AUDIO SYNTH CORES ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playLaserSound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playExplodeSound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // --- SPALWN MANAGEMENT ---
        function spawnEnemy() {
            if (!gameActive) return;
            
            let x, y;
            // Spawn vectors completely off-screen randomly to avoid popping in front of player
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? -20 : canvas.width + 20;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? -20 : canvas.height + 20;
            }

            let baseSpeed = 1.2 + (wave * 0.15);
            enemies.push({ x, y, radius: 10, speed: baseSpeed });

            // Schedule next drop faster as current score climbs
            let nextSpawn = Math.max(300, 1500 - (score * 20));
            clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnEnemy, nextSpawn);
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x, y: y,
                    dx: (Math.random() - 0.5) * 4,
                    dy: (Math.random() - 0.5) * 4,
                    radius: Math.random() * 3,
                    alpha: 1
                });
            }
        }

        // --- CORE RUNTIME ENGINES ---
        function update() {
            // Player Translation Movements
            if (keys['w'] && player.y > player.radius) player.y -= player.speed;
            if (keys['s'] && player.y < canvas.height - player.radius) player.y += player.speed;
            if (keys['a'] && player.x > player.radius) player.x -= player.speed;
            if (keys['d'] && player.x < canvas.width - player.radius) player.x += player.speed;

            // Handle Bullets Physics Loop
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.dx;
                b.y += b.dy;

                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }

            // Handle Neon Vector Enemies Loop tracking coordinates
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * e.speed;
                e.y += Math.sin(angle) * e.speed;

                // Player Crash Collision Check
                let distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
                if (distToPlayer < player.radius + e.radius) {
                    endGame();
                    return;
                }

                // Check Bullet Hits
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let distToBullet = Math.hypot(b.x - e.x, b.y - e.y);
                    
                    if (distToBullet < b.radius + e.radius) {
                        createExplosion(e.x, e.y, '#ef4444');
                        playExplodeSound();
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score++;
                        scoreDisplay.innerText = "Kills: " + score;

                        // Increment tracking waves every 12 kills
                        if (score % 12 === 0) {
                            wave++;
                            waveDisplay.innerText = "Wave: " + wave;
                        }
                        break;
                    }
                }
            }

            // Clean up old explosion particle tracks
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.dx; p.y += p.dy;
                p.alpha -= 0.04;
                if (p.alpha <= 0) particles.splice(i, 1);
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Background grid crosshairs
            ctx.strokeStyle = '#161625'; ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let j=0; j<canvas.height; j+=40) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(canvas.width,j); ctx.stroke(); }

            // Draw Aiming Reticle Line Guide
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.2)';
            ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();

            // Render Explosion FX Particles
            particles.forEach(p => {
                ctx.fillStyle = `rgba(239, 68, 68, ${p.alpha})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
            });

            // Draw Player Core
            ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 3; ctx.stroke();

            // Draw Lasers
            bullets.forEach(b => {
                ctx.fillStyle = '#60a5fa'; ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fill();
            });

            // Draw Enemies
            enemies.forEach(e => {
                ctx.fillStyle = '#11111e'; ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3; ctx.stroke();
            });
        }

        function gameTick() {
            if (!gameActive) return;
            update();
            render();
            requestAnimationFrame(gameTick);
        }

        // --- STAGE CONTROLS ---
        function startGame() {
            initAudio();
            player = { x: 350, y: 225, radius: 12, speed: 4.2 };
            bullets = []; enemies = []; particles = [];
            score = 0; wave = 1;
            scoreDisplay.innerText = "Kills: 0";
            waveDisplay.innerText = "Wave: 1";
            menuOverlay.classList.add('hidden');
            gameActive = true;
            
            clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnEnemy, 1200);
            gameTick();
        }

        function endGame() {
            gameActive = false;
            clearInterval(spawnInterval);
            gameStatus.innerText = "OVERRUN!";
            finalStats.innerHTML = `You cleared <b>Wave ${wave}</b> with <b>${score} vector kills</b>.`;
            menuOverlay.classList.remove('hidden');
        }
    </script>
</body>
</html>
